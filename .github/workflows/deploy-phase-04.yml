name: Deploy Phase 04 — Orchestration (Function webhook + n8n Container App)

# EPIC-002 / Story 2.4 (F4 — Orquestração visual com n8n). Faz DUAS coisas, em jobs
# separados:
#   1. deploy-function : rebuilda + publica a Function F1 (PurchaseConsumerFunction
#      agora dispara um webhook fire-and-forget ao n8n após gravar a compra) e injeta
#      o App Setting N8N_WEBHOOK_URL na Function App.
#   2. deploy-n8n      : cria/atualiza o Container App do n8n (n8nio/n8n:latest —
#      decisão de owner, ADE-002 Inv 4) dentro do Container Apps Environment, com
#      Azure Files montado em /home/node/.n8n e basic auth + HTTPS-only.
#
# Dispara no push da branch da fase ou manualmente.
#
# Pré-requisitos (configurados pelo @devops / por aluno):
#   Function:
#     - secret  FUNCTION_PUBLISH_PROFILE : publish profile da Function App
#     - var     FUNCTION_APP_NAME        : nome da Function App de destino
#     - secret  N8N_WEBHOOK_URL                  : URL do webhook do workflow n8n
#         (ex.: https://<n8n-fqdn>/webhook/purchase). Secret e não var: a URL contém o
#         FQDN do n8n do aluno e o path do webhook — mantida fora do log público.
#   n8n (Container App):
#     - secret  AZURE_CREDENTIALS                : service principal (az login)
#     - var     PHASE02_RESOURCE_GROUP           : resource group do aluno
#     - var     PHASE04_CONTAINERAPP_ENV         : nome do Container Apps Environment
#         (cae-fifa2026-<iniciais>) — o mesmo type já criado para o gateway YARP (F2)
#     - var     PHASE04_N8N_APP_NAME             : nome do Container App do n8n
#     - var     PHASE04_N8N_FQDN_HOST            : FQDN público planejado do n8n (N8N_HOST/WEBHOOK_URL)
#     - var     PHASE04_STORAGE_ACCOUNT          : Storage Account com o file share n8n-data
#     - var     PHASE04_FILE_SHARE              : nome do file share (default: n8n-data)
#     - var     PHASE04_ACA_STORAGE_NAME        : nome lógico do storage no CAE (volume mount)
#     - secret  N8N_BASIC_AUTH_PASSWORD          : senha do basic auth do n8n (gerada pelo aluno)
#
# NOTA (ADE-002 Inv 4 — decisão de owner): a imagem do n8n é n8nio/n8n:latest (sempre
# a versão mais nova). Validar o workflow post-purchase-notification no início de cada
# aula (Story 2.4 Task 10.2), pois latest pode ter avançado desde a última aula.

on:
  workflow_dispatch:
    inputs:
      function_app_name:
        description: 'Azure Function App name (override)'
        required: false
      n8n_app_name:
        description: 'n8n Container App name (override)'
        required: false

env:
  DOTNET_VERSION: '8.0.x'
  N8N_IMAGE: 'n8nio/n8n:latest'   # ADE-002 Inv 4 — decisão de owner (sempre a versão mais nova)

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Function F1 (PurchaseConsumerFunction agora dispara webhook ao n8n).
  # ---------------------------------------------------------------------------
  deploy-function:
    runs-on: ubuntu-latest
    environment: production
    env:
      PROJECT_PATH: 'src/Fifa2026.V2.Functions'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: Test
        # SEM --no-build (lição do gate S2.1 / H-1): o dotnet test faz restore+build
        # do projeto de testes E da dependência Fifa2026.V2.Functions em Release.
        # Os steps Restore/Build acima cobrem só o projeto das Functions, não o de
        # testes — usar --no-build aqui falharia.
        run: dotnet test src/Fifa2026.V2.Functions.Tests -c Release --verbosity normal
        continue-on-error: false

      - name: Publish
        # --no-build seguro: o step Build acima já compilou o PROJECT_PATH em Release,
        # que é exatamente o projeto publicado aqui.
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ./publish --no-build

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ github.event.inputs.function_app_name || vars.FUNCTION_APP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.FUNCTION_PUBLISH_PROFILE }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set N8N_WEBHOOK_URL App Setting (AC-6 — nunca hardcoded)
        env:
          FUNCTION_APP_NAME: ${{ github.event.inputs.function_app_name || vars.FUNCTION_APP_NAME }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${N8N_WEBHOOK_URL}" ]; then
            echo "AVISO: secret N8N_WEBHOOK_URL vazio — o consumer fará no-op no webhook (F4 inativo)."
            echo "Configure o secret após ativar o workflow no n8n UI e copiar a URL gerada."
            exit 0
          fi
          # App Setting lido por IConfiguration["N8N_WEBHOOK_URL"] (ver N8nWebhookNotifier).
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group ${{ vars.PHASE02_RESOURCE_GROUP }} \
            --settings "N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}"
          echo "App Setting N8N_WEBHOOK_URL aplicado na Function App."

  # ---------------------------------------------------------------------------
  # Job 2 — n8n Container App (n8nio/n8n:latest, Azure Files, basic auth, HTTPS).
  # ---------------------------------------------------------------------------
  deploy-n8n:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure az containerapp extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Validate basic-auth password present (AC-10 — basic auth obrigatório)
        env:
          N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${N8N_BASIC_AUTH_PASSWORD}" ]; then
            echo "ERRO: secret N8N_BASIC_AUTH_PASSWORD é obrigatório (AC-10 — n8n não sobe sem basic auth)." >&2
            exit 1
          fi

      - name: Bind Azure Files storage to Container Apps Environment (AC-4)
        env:
          STORAGE_ACCOUNT: ${{ vars.PHASE04_STORAGE_ACCOUNT }}
          FILE_SHARE: ${{ vars.PHASE04_FILE_SHARE }}
          ACA_STORAGE_NAME: ${{ vars.PHASE04_ACA_STORAGE_NAME }}
          CAE_NAME: ${{ vars.PHASE04_CONTAINERAPP_ENV }}
        run: |
          set -euo pipefail
          FILE_SHARE="${FILE_SHARE:-n8n-data}"
          # Chave da Storage Account para o CAE montar o file share (AC-4 — persistência).
          STORAGE_KEY=$(az storage account keys list \
            --account-name "$STORAGE_ACCOUNT" \
            --resource-group ${{ vars.PHASE02_RESOURCE_GROUP }} \
            --query '[0].value' -o tsv)
          # Registra (ou atualiza) o storage no Environment como Azure Files (ReadWrite).
          az containerapp env storage set \
            --name "$CAE_NAME" \
            --resource-group ${{ vars.PHASE02_RESOURCE_GROUP }} \
            --storage-name "$ACA_STORAGE_NAME" \
            --azure-file-account-name "$STORAGE_ACCOUNT" \
            --azure-file-account-key "$STORAGE_KEY" \
            --azure-file-share-name "$FILE_SHARE" \
            --access-mode ReadWrite

      - name: Create or update n8n Container App (AC-3 / AC-10)
        env:
          N8N_APP_NAME: ${{ github.event.inputs.n8n_app_name || vars.PHASE04_N8N_APP_NAME }}
          CAE_NAME: ${{ vars.PHASE04_CONTAINERAPP_ENV }}
          N8N_HOST: ${{ vars.PHASE04_N8N_FQDN_HOST }}
          N8N_BASIC_AUTH_PASSWORD: ${{ secrets.N8N_BASIC_AUTH_PASSWORD }}
        run: |
          set -euo pipefail
          RG=${{ vars.PHASE02_RESOURCE_GROUP }}

          # Env vars rastreadas a https://docs.n8n.io/hosting/environment-variables/ (AC-13).
          # A senha entra como secret do Container App; a env var referencia o secret.
          COMMON_ENV=(
            "N8N_BASIC_AUTH_ACTIVE=true"
            "N8N_BASIC_AUTH_USER=admin"
            "N8N_BASIC_AUTH_PASSWORD=secretref:n8n-basic-auth-password"
            "N8N_HOST=${N8N_HOST}"
            "WEBHOOK_URL=https://${N8N_HOST}"
            "N8N_PROTOCOL=https"
            "N8N_PORT=5678"
            "DB_TYPE=sqlite"
            "GENERIC_TIMEZONE=America/Sao_Paulo"
          )

          if az containerapp show --name "$N8N_APP_NAME" --resource-group "$RG" >/dev/null 2>&1; then
            echo "Container App $N8N_APP_NAME existe — atualizando para ${N8N_IMAGE}."
            az containerapp secret set \
              --name "$N8N_APP_NAME" --resource-group "$RG" \
              --secrets "n8n-basic-auth-password=${N8N_BASIC_AUTH_PASSWORD}"
            az containerapp update \
              --name "$N8N_APP_NAME" --resource-group "$RG" \
              --image "${N8N_IMAGE}" \
              --set-env-vars "${COMMON_ENV[@]}"
          else
            echo "Criando Container App $N8N_APP_NAME (${N8N_IMAGE})."
            az containerapp create \
              --name "$N8N_APP_NAME" --resource-group "$RG" \
              --environment "$CAE_NAME" \
              --image "${N8N_IMAGE}" \
              --target-port 5678 \
              --ingress external \
              --transport http \
              --min-replicas 0 --max-replicas 2 \
              --cpu 0.5 --memory 1.0Gi \
              --secrets "n8n-basic-auth-password=${N8N_BASIC_AUTH_PASSWORD}" \
              --env-vars "${COMMON_ENV[@]}"
          fi

      - name: Mount Azure Files volume into n8n (/home/node/.n8n) (AC-4)
        env:
          N8N_APP_NAME: ${{ github.event.inputs.n8n_app_name || vars.PHASE04_N8N_APP_NAME }}
          ACA_STORAGE_NAME: ${{ vars.PHASE04_ACA_STORAGE_NAME }}
        run: |
          set -euo pipefail
          RG=${{ vars.PHASE02_RESOURCE_GROUP }}
          # O mount do volume Azure Files é editado via YAML do Container App (template).
          # Exporta a definição atual, injeta volume + volumeMount e reaplica.
          # O arquivo infra/phase-04/n8n-volume-patch.yaml documenta a forma esperada
          # (volumes[].storageName + containers[].volumeMounts[].mountPath=/home/node/.n8n).
          echo "Aplicando patch de volume (storageName=${ACA_STORAGE_NAME} → /home/node/.n8n)."
          az containerapp show --name "$N8N_APP_NAME" --resource-group "$RG" -o yaml > current-app.yaml
          python3 infra/phase-04/apply-volume-mount.py \
            current-app.yaml "${ACA_STORAGE_NAME}" /home/node/.n8n > patched-app.yaml
          az containerapp update --name "$N8N_APP_NAME" --resource-group "$RG" --yaml patched-app.yaml

      - name: Smoke test (AC-10 — basic auth obrigatório + HTTPS)
        env:
          N8N_APP_NAME: ${{ github.event.inputs.n8n_app_name || vars.PHASE04_N8N_APP_NAME }}
        run: |
          set -euo pipefail
          RG=${{ vars.PHASE02_RESOURCE_GROUP }}
          FQDN=$(az containerapp show --name "$N8N_APP_NAME" --resource-group "$RG" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Aguardando warmup do n8n (cold start scale-to-zero)..."
          sleep 25
          # AC-10: acesso sem basic auth deve ser rejeitado (401).
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://${FQDN}/")
          echo "GET / sem auth → HTTP $STATUS (esperado 401)."
          if [ "$STATUS" != "401" ]; then
            echo "ERRO: n8n deveria exigir basic auth (401) no acesso à UI." >&2
            exit 1
          fi
          echo "Smoke test OK — n8n exige basic auth (401 sem credenciais)."
